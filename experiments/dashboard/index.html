  <script>
    const payload = {"smartAlgorithm": "# SMART Algorithm Deep Dive\n\n## 1) What SMART is really doing\n\nSMART (Switching via Monotone Adapted Regret Traces) is a one-switch meta-policy that combines:\n\n- an optimistic policy (`FTL`), strong on benign instances,\n- a robust policy (`W`) with known worst-case regret bound `g(n)`.\n\nThe core guarantee target is:\n\n\\[\n\\mathrm{Reg}(\\text{SMART},\\ell^n)\n\\lesssim\n\\gamma\\cdot \\min\\{\\mathrm{Reg}(\\mathrm{FTL},\\ell^n),\\ g(n)\\}\n\\]\n\nwith:\n\n- deterministic threshold: `gamma = 2` (plus small additive constant),\n- randomized threshold: `gamma = e/(e-1) \\approx 1.58` (plus small additive constant).\n\nThe paper’s converse lower bound (`~1.4335`) means this is close to optimal in a strong sense.\n\n## 2) The mathematical hinge: adapted, monotone, anytime FTL trace\n\nThe algorithm is possible because of the exact decomposition:\n\n\\[\n\\mathrm{Reg}(\\mathrm{FTL},\\ell^n)\n= \\sum_{t=1}^n \\big(L_t(a^*_{t-1}) - L_t(a^*_t)\\big)\n\\]\n\nwhere `L_t` is cumulative loss up to `t`, and `a^*_t` is the hindsight minimizer up to `t`.\n\nDefine:\n\n\\[\n\\Sigma_t := \\sum_{i=1}^t \\big(L_i(a^*_{i-1}) - L_i(a^*_i)\\big)\n\\]\n\nThen:\n\n1. `Sigma_t` is **adapted** (computable online at time `t`),\n2. `Sigma_t` is **monotone nondecreasing**,\n3. `Sigma_t` is an **anytime lower bound** on final FTL regret (`Sigma_t <= Reg(FTL, l^n)`), with equality at `t=n`.\n\nThis is exactly what turns hindsight-style regret comparison into an online stopping rule.\n\n## 3) Canonical SMART policy (single switch)\n\nFor threshold `theta`:\n\n1. play FTL while `Sigma_t <= theta`,\n2. at first violation, switch permanently to robust policy `W`,\n3. reset losses for `W` (fresh start on suffix).\n\nThe reset is not cosmetic. It is structurally required for the proof decomposition into:\n\n- pre-switch regret part (`FTL` segment),\n- post-switch regret part (`W` on suffix).\n\nWithout reset, the clean additive decomposition used for competitive analysis can fail.\n\n## 4) Ski-rental reduction: what is equivalent and what is not\n\nEquivalent structure:\n\n- continue FTL = keep renting,\n- switch to `W` = buy,\n- cumulative FTL-trace growth = rental accumulation,\n- `g(n-\\tau)` = post-switch purchase-like cost.\n\nNot literally identical:\n\n- rental increments are sequence-dependent (not fixed 1),\n- post-switch cost is `g(n-\\tau)` not fixed constant, though monotone.\n\nBut the competitive-analysis machinery still transfers almost exactly.\n\n## 5) Deterministic vs randomized threshold\n\n### Deterministic\nSet `theta = g(n)`.\n\nGuarantee (paper):\n\n\\[\n\\mathrm{Reg}(\\text{SMART},\\ell^n)\n\\le\n2\\min\\{\\mathrm{Reg}(\\mathrm{FTL},\\ell^n), g(n)\\} + O(1)\n\\]\n\n### Randomized\nSample\n\n\\[\n\\theta = g(n)\\log(1 + (e-1)U),\\quad U\\sim \\mathrm{Unif}[0,1]\n\\]\n\nGuarantee (paper):\n\n\\[\n\\mathbb{E}[\\mathrm{Reg}(\\text{SMART},\\ell^n)]\n\\le\n\\frac{e}{e-1}\\min\\{\\mathrm{Reg}(\\mathrm{FTL},\\ell^n), g(n)\\} + O(1)\n\\]\n\nInterpretation:\n\n- deterministic is simpler and robustly understandable,\n- randomized is tighter and minimax-optimal in the ski-rental analogue.\n\n## 6) Independent sanity checks (not tied to repo implementations)\n\nI ran lightweight Monte Carlo checks of the normalized ski-rental-style model.\n\n### Check A: randomized threshold gives ~constant ratio\nFor normalized `g=1`, across many `r = Reg(FTL)/g`, expected ratio stayed near `1.58` as theory predicts.\n\n### Check B: deterministic threshold = 2-competitive optimum (single-threshold family)\nFor deterministic scaled threshold `theta = c g`, worst-case ratio in this family is:\n\n\\[\n\\max\\{1+c,\\ 1+1/c\\}\n\\]\n\nMinimized at `c=1`, giving ratio `2`.\n\n### Check C: calibration sensitivity is real\nIf threshold scale is misspecified (`theta` too low or too high), worst-case ratio degrades quickly. In numerical sweeps:\n\n- under-scaling (`alpha=0.7`) produced worst-case around `~2.0`,\n- over-scaling (`alpha=1.5`) produced worst-case around `~1.9`,\n- near-correct scale (`alpha~1`) stayed near `~1.58`.\n\nImplication: empirical threshold estimation must be treated as a first-class modeling problem, not a detail.\n\n## 7) What the lower bound implies for design\n\nThe paper’s converse (~`1.4335`) has practical consequences:\n\n1. Do not chase exact `min(Reg(FTL), g)`; impossible in general.\n2. Multi-switch strategies may beat `1.58` in principle, but only modestly (gap to `1.4335` is limited).\n3. The single-switch template is a strong bias unless there is clear evidence of repeated regime reversals.\n\n## 8) Subtle but critical specification details\n\nAny correct SMART implementation must specify these explicitly:\n\n1. **What exactly is `Sigma_t`?**\n- Must correspond to FTL regret trace from decomposition, not arbitrary proxy.\n\n2. **What is `g`?**\n- fixed-horizon theoretical bound,\n- empirical estimated bound,\n- path-dependent bound (`g(l^n)` style extension).\n\n3. **Switch timing convention**\n- switch when `Sigma_t > theta` vs `>=` matters around ties/discrete increments.\n\n4. **Post-switch reset semantics**\n- robust algorithm runs on suffix only (proof-critical in baseline theory).\n\n5. **Comparator definition**\n- best fixed action over full horizon vs per-suffix comparator must be consistent with reported regret.\n\n6. **Randomization semantics**\n- threshold sampled once globally vs resampled per run/per horizon.\n\nMany implementation mismatches in practice come from one of these six points.\n\n## 9) Where SMART is strongest, and where it is weak\n\n### Strong\n\n- Mixed environments with mostly benign behavior and occasional adversarial phases.\n- Settings where robust algorithm has a clean, trusted `g(n)`.\n- Use cases where one major regime transition dominates.\n\n### Weak / fragile\n\n- Fast oscillations that would benefit from multiple switches.\n- Miscalibrated or noisy `g` estimates.\n- Environments where FTL trace proxy is weakly correlated with future regret danger.\n\n## 10) Experiment implications and redesign guidance\n\nIf we want stronger empirical evidence, experiments should answer these precise questions:\n\n1. **Switch quality**\n- How often is switch too early / too late / never?\n- What is regret penalty decomposition from each failure mode?\n\n2. **Threshold calibration curves**\n- Plot competitive ratio surrogate vs threshold scale.\n- Include both theoretical and empirical `g`.\n\n3. **Regime-transition stress tests**\n- single abrupt shift,\n- smooth drift,\n- burst corruption,\n- repeated switching.\n\n4. **Decomposition diagnostics**\n- track `Sigma_t`, threshold, switch time,\n- track pre-switch vs post-switch regret contributions separately.\n\n5. **Robustness to modeling choices**\n- loss surrogate variants,\n- comparator variants,\n- norm constraints.\n\n### A better experiment template (recommended)\n\nFor each setting (binary, OLC, quadratic OCO):\n\n1. Create four regimes: benign, drift, one-shift, bursty-corruption.\n2. Evaluate `{FTL, robust baseline, SMART-theory, SMART-empirical}`.\n3. Report:\n- final regret,\n- regret-vs-time,\n- switch statistics (`switch rate`, `median switch time`, `never-switch rate`),\n- calibration sensitivity curve.\n\nThis directly tests SMART’s intended behavior rather than only final aggregate regret.\n\n## 11) Correctness checklist for future implementations\n\nUse this as a hard gate before trusting plots:\n\n1. Unit tests verify FTL decomposition numerically on small synthetic cases.\n2. Monotonicity of `Sigma_t` is asserted.\n3. Deterministic threshold special cases:\n- very high threshold => SMART == FTL,\n- threshold ~0 => immediate switch behavior.\n4. Randomized-threshold empirical ratio on normalized toy model is near `1.58`.\n5. Reset/no-reset behavior is explicit and tested.\n6. Reproducibility: seeded, deterministic pipelines for all figure scripts.\n\n## 12) Applications and interpretation\n\nSMART is best understood as a **risk-budgeted optimism controller**:\n\n- optimism phase exploits easy structure quickly,\n- switch rule enforces a monotone risk budget,\n- robust phase caps tail behavior.\n\nThis applies naturally to:\n\n- online classification with distribution shift,\n- recommendation/ranking under occasional adversarial behavior,\n- operations/control systems with rare but severe regime breaks.\n\nIn applied terms, SMART provides a transparent policy knob: threshold policy (`theory`, `empirical`, or hybrid) controls aggressiveness of optimism.\n\n## 13) Open technical directions worth exploring\n\n1. Multi-switch SMART with provable competitive ratio between `1.4335` and `1.58`.\n2. Data-adaptive threshold laws with finite-sample calibration guarantees.\n3. Partial-information/bandit analogues of adapted regret traces.\n4. Confidence-aware SMART: switch based on posterior uncertainty in `g` and trace.\n5. Path-dependent robust bounds (`g(\\ell^n)`) beyond small-loss experts.\n\n## 14) Properties\n\nThis section summarizes properties of SMART that are especially useful for designing and interpreting experiments.\n\n### 14.1 Structural Properties\n\n1. **Single-switch monotonicity**\n- Once SMART switches to the robust policy, it never returns to FTL.\n- This reduces policy oscillation but introduces irreversibility cost if the environment later becomes benign again.\n\n2. **Trace-driven stopping rule**\n- SMART's decision variable is not raw loss but the adapted regret trace `Sigma_t`.\n- This is critical: sequence geometry of `Sigma_t` (early growth vs late growth) strongly affects behavior.\n\n3. **Prefix/suffix decomposition**\n- With reset semantics, SMART regret decomposes naturally into:\n  - prefix (FTL) segment,\n  - suffix (robust) segment.\n- This decomposition is the main reason guarantees are analyzable.\n\n4. **Scale dependence on `g`**\n- SMART is invariant to many details except threshold scaling against true robust difficulty.\n- If `g` is miscalibrated, switching can become systematically early or late.\n\n### 14.2 Quantitative/Competitive Properties\n\n1. **Deterministic threshold optimality within single-threshold family**\n- For threshold `theta = c g`, worst-case competitive ratio behaves like\n  `max(1+c, 1+1/c)`, minimized at `c=1` with ratio `2`.\n\n2. **Randomized threshold equalization effect**\n- The paper's threshold law approximately equalizes expected ratio across hardness levels.\n- This explains why the expected factor is nearly constant near `e/(e-1)`.\n\n3. **Near-optimality gap is small**\n- Upper bound ~`1.58`, lower bound ~`1.4335`.\n- This suggests single-switch SMART is already close to fundamental limits.\n\n### 14.3 Practical/Implementation Properties\n\n1. **Specification sensitivity**\n- Small implementation choices matter:\n  - `>` vs `>=` switch trigger,\n  - reset vs no-reset post-switch,\n  - horizon-specific vs anytime threshold,\n  - comparator definition.\n\n2. **Calibration fragility**\n- Threshold misspecification can significantly degrade competitive behavior.\n- Empirical threshold estimation should be treated as a core component.\n\n3. **Interpretability**\n- SMART is interpretable as a risk budget controller:\n  - spend optimism while trace budget is low,\n  - switch when budget is exhausted.\n\n## 15) Experiments To Explore\n\nThis section proposes experiments that are likely to produce the most informative revisions to the empirical story.\n\n### 15.1 Core diagnostic experiments\n\n1. **Switch quality audit**\n- For each run, label switch as:\n  - too early,\n  - near-optimal,\n  - too late,\n  - never.\n- Report frequency and regret penalty by category.\n\n2. **Trace decomposition plots**\n- For each regime, plot:\n  - `Sigma_t`,\n  - threshold,\n  - switch round,\n  - pre-switch and post-switch regret components.\n\n3. **Calibration frontier**\n- Sweep threshold scaling factors and plot:\n  - final regret of FTL / robust / SMART,\n  - switch-time distributions,\n  - competitive-ratio surrogate.\n\n### 15.2 Regime design experiments\n\n1. **Timing sensitivity**\n- Hold total hardness fixed; vary onset time of adversarial phase.\n- Measure how switch timing changes and how much regret is avoidable.\n\n2. **Recovery/irreversibility stress test**\n- Sequence pattern: benign -> adversarial burst -> benign.\n- Quantify the price of one-way switching versus a hypothetical multi-switch oracle.\n\n3. **Smooth drift vs abrupt shift**\n- Compare linear drift and one-time jump with matched aggregate difficulty.\n- Identify when single-switch policies are structurally sufficient.\n\n4. **Burst frequency experiment**\n- Keep total corruption mass fixed but vary burst fragmentation.\n- Tests whether SMART's one-switch bias is vulnerable to repeated short bursts.\n\n### 15.3 Cross-domain application experiments\n\n1. **Online linear classification with realistic shifts**\n- Covariate shift + label-noise bursts + separator drift.\n- Evaluate whether SMART tracks FTL on easy phases and robust baseline on hard phases.\n\n2. **Recommendation under manipulation bursts**\n- User-interest stability with periodic bot/fraud perturbations.\n- Show practical utility of switching behavior over static optimistic strategies.\n\n3. **Clinical policy drift simulation**\n- Stable treatment response followed by protocol/population shift.\n- Evaluate safety-performance tradeoff under adversarial/benign mixtures.\n\n### 15.4 Validation experiments for implementation correctness\n\n1. **Ablation on switch rule details**\n- Compare `>` vs `>=`, reset vs no-reset, fixed vs empirical thresholds.\n\n2. **Reproducibility harness**\n- Fixed seeds, deterministic configs, and CI checks for all main figures.\n\n3. **Toy-theory consistency checks**\n- Validate deterministic `2x` and randomized `~1.58x` behavior on controlled synthetic tasks.\n\n---\n\n## Bottom line\n\nThe deepest insight of SMART is not merely “switch once.”\nIt is the discovery that FTL admits an online-computable, monotone regret trace that makes a hindsight-comparison objective operational in real time.\n\nThat structural bridge is why competitive-analysis tools become relevant, why the guarantees are strong, and why implementation details around the trace/threshold/reset are non-negotiable for correctness.\n\n## 16) What SMART Experiments Must Demonstrate (Paper Focus)\n\nTo be paper-useful, SMART experiments should demonstrate mechanism validity, not just isolated wins.\n\n1. **No unnecessary optimism tax in benign regimes**\n- When optimism is correct, SMART should stay close to FTL and avoid overpaying for robustness.\n\n2. **Robust protection in hard regimes**\n- When optimistic behavior becomes unreliable, SMART should switch and avoid FTL-style blow-ups.\n\n3. **Interpretable adaptation**\n- The switch should be explainable via `Sigma_t` crossing threshold near meaningful regime deterioration.\n- Diagnostics should support a causal narrative (what changed, when, and why SMART reacted).\n\nThis is the central empirical story: SMART should track the better side of the optimism/robustness tradeoff, with switching behavior that is both effective and interpretable.\n", "experiments": [{"slug": "exp01_best_of_all_worlds", "displayName": "Experiment 01: Best-of-All-Worlds Binary Prediction (Legacy)", "readme": "# Experiment 01: Best-of-All-Worlds Binary Prediction (Legacy)\n\n## Why this experiment exists\n\nThis is the original binary-prediction sandbox where the SMART idea was first stress-tested against both optimistic and robust alternatives.\n\nCore question:\n\nIn two-expert binary prediction, can SMART track optimistic performance on easy sequences while avoiding the worst optimistic failures on adversarially structured sequences?\n\nThis folder is intentionally kept as a legacy experiment environment. It is useful for conceptual evidence and historical baselines, but it is less standardized than later experiments.\n\n## Problem setup\n\n- Outcomes are binary: $x_t \\in \\{0,1\\}$.\n- Algorithms output probability-like actions $w_t \\in [0,1]$ for predicting 1.\n- Instant loss is Bernoulli linear loss:\n  $$\n  (1-x_t)w_t + x_t(1-w_t)\n  $$\n- Regret is measured against the best fixed binary expert (always-0 vs always-1) unless a deeper context comparator is explicitly used.\n\n## Algorithms emphasized for SMART comparison\n\n- `FTL_binary` (optimistic)\n- `Cover_binary` (robust fallback used by deterministic SMART in this experiment code)\n- `SMART_det_binary` and `SMART_random_binary`\n\nAdditional baselines in this legacy stack (AdaHedge, FlipFlop, ABProd, Blackwell variants) remain available for broader comparisons.\n\n## SMART definitions used in this legacy code\n\n### Deterministic SMART (`SMART_det_binary`)\n\n- FTL-regret proxy in this implementation:\n  $$\n  \\mathrm{reg}_{\\mathrm{ftl}}(t) = 0.5\\cdot \\text{cumulative\\_count}\\{S_t=0\\},\n  $$\n  where $S_t$ is signed cumulative imbalance.\n- threshold:\n  $$\n  \\theta = \\sqrt{\\frac{n}{2\\pi}}\n  $$\n- policy:\n  - play FTL until threshold crossing, then switch to Cover for the suffix\n\n### Randomized SMART (`SMART_random_binary`)\n\n- mixes FTL and Cover with time-varying weight based on the same regret proxy and global scale\n  $$\n  g_n = \\sqrt{\\frac{n}{2\\pi}}\n  $$\n- intended to emulate the randomized-threshold spirit in a binary-expert setting\n\n## Sequence families (exact constructions)\n\n### 1) i.i.d. Bernoulli (`generate_iid_sequence(n,p)`)\n\n- sample each bit independently from $\\mathrm{Bernoulli}(p)$.\n\nPurpose:\n\n- benign/stochastic baseline where optimism should not be heavily penalized.\n\n### 2) FMG sequence (`generate_FMG_sequence(n,c)`)\n\n- create $c$ randomly oriented alternating pairs ($01$ or $10$)\n- fill the remainder with ones\n- constraint: $2c \\le n$\n\nPurpose:\n\n- control number of crossings/ties and stress optimistic tie behavior.\n\n### 3) High-loss FMG (`generate_highlossFMG_ftl(n,c,p)`)\n\n- first $2c$ bits are alternating pairs\n- then append $[1,1]$\n- fill remainder with Bernoulli tail (default $p=0.3$)\n\nPurpose:\n\n- produce FMG-style structure with heavier optimistic stress.\n\n### 4) Loss-shaped sequences (`loss_based_sequence_generation`)\n\n- greedily choose next bit to keep cumulative expert-loss difference close to a target function (for example $n^{0.4}$)\n\nPurpose:\n\n- construct trajectories that reproduce specific regret-growth patterns and expose weaknesses of some adaptive-hedging baselines.\n\n## What this experiment is intended to demonstrate\n\n1. On i.i.d.-style sequences, SMART should stay close to optimistic behavior.\n2. On FMG / high-loss / loss-shaped sequences, SMART should reduce downside relative to pure FTL.\n3. Across easy and hard families, SMART should behave like a practical compromise between optimism and robustness.\n\n## Evaluation and outputs in this legacy stack\n\nMain entry points:\n\n- `graph_driver.py`\n- `blackwells_worst_experimentation.py`\n- `graphing_gui.py`\n\nCore analysis code:\n\n- algorithms: `Scripts/algorithms.py`\n- sequence generation: `Scripts/sequence_generation.py`\n- plotting: `Scripts/graphing.py`\n\nHistorical plots are stored under `Graphs/` and experiment root PNGs.\n\n## Current empirical interpretation\n\nHistorically, this experiment established the qualitative SMART narrative:\n\n- SMART behaves close to FTL on benign binary streams.\n- SMART avoids some of FTL's worst binary adversarial constructions by switching to a safer policy.\n- Carefully designed loss-shaped sequences are important for revealing differences among adaptive methods.\n\n## Limits and non-claims\n\n- This is a legacy, non-unified pipeline (multiple drivers, historical outputs mixed together).\n- Comparator definitions vary across some scripts (binary expert vs context-tree expert), so claims must be tied to the exact script used.\n- This folder is strongest as historical mechanism evidence, not as the final standardized paper pipeline.\n", "figures": []}, {"slug": "exp02_online_linear_classification", "displayName": "Experiment 02: Online Linear Classification SMART Study", "readme": "# Experiment 02: Online Linear Classification SMART Study\n\n## Why this experiment exists\n\nThis experiment tests SMART in a vector-valued online linear classification setting where sequence hardness can vary from easy separable data to adversarial label patterns.\n\nCore question:\n\nCan SMART keep optimistic behavior when FTL is good, while switching in time to avoid optimistic failure modes on harder streams?\n\nA second question in this experiment is calibration:\n\nDoes using an empirical robust threshold $g(T)$ improve practical switching versus purely theoretical scaling?\n\n## Problem setup\n\nAt each round, the learner predicts with $x_t$ constrained to the unit Euclidean ball, observes $(z_t, y_t)$, and is scored with the surrogate used in code:\n\n$$\n\\ell_t(x) = \\tfrac{1}{2}\\,|\\langle z_t, x\\rangle - y_t|.\n$$\n\nThe reported metric is cumulative regret relative to the best fixed comparator action on the full horizon.\n\n## Algorithms compared\n\n- `FTRL` (robust baseline)\n- `FTL` (optimistic baseline)\n- `SMART` with theoretical threshold ($\\theta = \\sqrt{2T}$)\n- `SMART` with empirical threshold ($\\theta = g_{\\text{emp}}(T)$)\n\n### Robust baseline specification\n\nThe robust baseline is FTRL with Euclidean projection ($\\eta_0=\\sqrt{2}$), matching the bounded linear-prediction geometry used throughout the experiment.\n\nWhy this baseline is appropriate here:\n\n1. It is the canonical robust online method for this constrained linear setting.\n2. It gives the fallback behavior SMART switches to.\n3. The same baseline defines empirical $g(T)$ (worst observed robust regret across adversarial families), so threshold calibration and robust comparator are internally consistent.\n\n## Sequence families (exact conceptual definitions)\n\n### 1) Random i.i.d. (separable)\n\n- sample a fixed unit separator $u$\n- sample $z_t \\sim \\mathcal{N}(0, I_d)$, then normalize each row to norm $\\le 1$\n- set labels $y_t = \\operatorname{sign}(\\langle z_t, u\\rangle)$\n\nPurpose:\n\n- benign baseline where optimism should be competitive.\n\n### 2) Massart noise 10%\n\n- same construction as separable stream\n- independently flip each label with probability $p = 0.10$\n\nPurpose:\n\n- mostly benign stream with moderate stochastic corruption.\n\n### 3) Label flips\n\n- deterministic feature direction ($z_t = e_1$)\n- labels alternate every round: $+1, -1, +1, -1, \\ldots$\n\nPurpose:\n\n- hard oscillatory stream that stresses optimistic stability.\n\n### 4) Switching leaders\n\n- deterministic feature direction ($z_t = e_1$)\n- labels in fixed blocks (default block length 20):\n  - $+1$ block, then $-1$ block, alternating\n\nPurpose:\n\n- clean leader-switching regime without adding geometric drift.\n\n## SMART threshold calibration used here\n\nTwo SMART variants are intentionally evaluated:\n\n1. Theory-scaled SMART: $\\theta = \\sqrt{2T}$.\n2. Empirical-threshold SMART: $\\theta = g_{\\text{emp}}(T)$.\n\n$g_{\\text{emp}}(T)$ is estimated by running robust FTRL over designated hard families and taking the maximum observed robust regret for each horizon in $T$-grid.\n\nThis isolates a practical question: whether calibrated thresholds improve switch timing and regret trade-offs.\n\n## Evaluation protocol\n\nDefault horizon grid in driver:\n\n- $T = 100, 200, \\ldots, 1000$\n\nFor each sequence family, the evaluation uses case-specific averaging budgets (`runs` x `replicates`) and reports mean regret with 95% confidence intervals.\n\nThe primary deliverables are:\n\n- `algorithm_comparison.png` (algorithm regret by sequence family)\n- `empirical_g_T.png` ($g_{\\text{emp}}(T)$ versus reference curves)\n\nCurated paper figures are tracked in `figures/INDEX.md`.\n\n## Current empirical interpretation\n\nBased on curated figures in `figures/`:\n\n1. On separable / low-noise families, optimistic behavior is strong and SMART is competitive with FTL.\n2. On label-flip and switching-leader families, pure optimism is less reliable; SMART variants improve robustness by switching.\n3. Empirical-threshold SMART can differ materially from theory-threshold SMART, showing that threshold calibration is not cosmetic.\n\n## What this experiment supports\n\nThis experiment supports two paper-relevant claims:\n\n- SMART's adaptation story extends from scalar toy settings to vector OLC streams.\n- Threshold calibration ($g(T)$ modeling) is an important empirical component of SMART, not a minor implementation detail.\n\n## Limits and non-claims\n\n- Sequence families are synthetic stress tests, not dataset-level claims.\n- Results are surrogate-loss and comparator-definition dependent.\n- The current fast path should not be treated as a trusted true-FTL implementation on boundary-heavy deterministic streams. With $\\|z_t\\|\\le 1$ and $y_t\\in\\{\\pm1\\}$, the surrogate loss is globally linear on the unit ball:\n\n$$\n\\ell_t(x)=\\tfrac12(1-y_t\\langle z_t,x\\rangle).\n$$\n\nTrue FTL is therefore computable in closed form from $M_t=\\sum_{i\\le t}y_i z_i$:\n\n$$\nx_t^{\\mathrm{FTL}}=\n\\begin{cases}\nM_{t-1}/\\|M_{t-1}\\|_2, & M_{t-1}\\ne 0,\\\\\n0, & M_{t-1}=0.\n\\end{cases}\n$$\n\nThe older fast implementation updates using a chosen subgradient at the played prediction. On deterministic norm-one streams such as blockwise $z_t=e_1$, this tie convention can diverge from the exact linear-loss FTL path and can even produce invalid negative regret because the comparator is then computed from the wrong state. A redesign should replace subgradient-state FTL with the closed-form linear-loss state above.\n\n## Outputs and code map\n\n- Curated figures index: `figures/INDEX.md`\n- Stream definitions: `sequence_generation.py`\n- Main algorithm simulation: `algorithms.py`\n- Fast implementation path: `fast_algorithms.py`, `fast_driver.py`\n- Exact FTL path: `exact_ftl.py`, `exact_ftl_driver.py`\n- Main experiment driver: `driver.py`\n", "figures": [{"filename": "fig_exp02_empirical_threshold_g_vs_theory.png", "src": "assets/exp02_online_linear_classification/fig_exp02_empirical_threshold_g_vs_theory.png", "title": "Empirical Robust Threshold g(T) vs Theoretical References"}, {"filename": "fig_exp02_olc_regret_by_sequence_family.png", "src": "assets/exp02_online_linear_classification/fig_exp02_olc_regret_by_sequence_family.png", "title": "Online Linear Classification Regret by Sequence Family"}, {"filename": "fig_exp02_olc_regret_comparison_main.png", "src": "assets/exp02_online_linear_classification/fig_exp02_olc_regret_comparison_main.png", "title": "Online Linear Classification: FTL/FTRL/SMART Regret Across Sequence Families"}]}, {"slug": "exp03_time_varying_mu_oco", "displayName": "Experiment 03: Time-Varying 1D Quadratic OCO for SMART", "readme": "# Experiment 03: Time-Varying 1D Quadratic OCO for SMART\n\n## Why this experiment exists\n\nThis experiment is the cleanest controlled setting for testing SMART's mechanism in a convex online-learning problem.\n\nCore question:\n\nWhen losses are generated by a drifting target parameter $\\mu_t$, can SMART stay optimistic when the process is stable and still protect against harder nonstationary phases?\n\nThis experiment is intended to be mechanistic and interpretable. It is not meant to be a real-world benchmark.\n\n## Problem setup\n\nThe learner chooses $a_t$ in a bounded domain:\n\n$$\na_t \\in [-1,1].\n$$\n\nAt round $t$, the loss is:\n\n$$\n\\ell_t(a) = \\tfrac{1}{2}(a-\\mu_t)^2.\n$$\n\nRegret is measured against the best fixed action in hindsight on each prefix/horizon.\n\n## Algorithms compared\n\n- `FTL` (optimistic baseline)\n- `OGD` (robust baseline)\n- `SMART` (FTL prefix, one-way switch to OGD when the online signal crosses threshold)\n\n### Robust baseline specification\n\nThe robust comparator is OGD on $[-1,1]$:\n\n- fixed-rate option: $\\eta = 2/\\sqrt{n}$\n- anytime option: $\\eta_t = 1/\\sqrt{t}$\n\nUpdate is projected gradient descent for the current quadratic loss.\n\nWhy OGD is the correct robust baseline here:\n\n1. Losses are convex and gradients are bounded on the chosen domain.\n2. OGD has standard $O(\\sqrt{n})$ worst-case behavior under these assumptions.\n3. SMART's robust branch needs a stable no-assumption fallback; OGD is exactly that in this 1D OCO setting.\n\n## SMART switch rule used in code\n\nThe code computes the adapted FTL trace $\\Sigma_t$ (eq.6-style decomposition) and uses deterministic threshold:\n\n$$\n\\text{threshold} = \\texttt{threshold\\_scale}\\cdot 2\\sqrt{n},\n$$\n\nand switches at first $t$ where\n\n$$\n\\Sigma_t > \\text{threshold}.\n$$\n\nAfter switching, the robust branch is reset and continued with OGD for the suffix.\n\n## Sequence model ($\\mu_t$) used for each scenario\n\nAll scenarios define full horizon-length sequences $\\mu_1,\\ldots,\\mu_n$.\n\n### 1) `stable_benign`\n\nGoal: optimism safety.\n\nGenerator:\n\n- AR(1)-style process around 0.60:\n  - init $x_0 = 0.60 + 0.01\\,\\mathcal{N}(0,1)$\n  - recurrence $x_t = 0.98x_{t-1} + 0.02\\cdot0.60 + 0.006\\,\\mathcal{N}(0,1)$\n- clip to $[-0.9, 0.9]$\n\nWhat this regime is meant to show:\n\n- FTL should be strong and SMART should track FTL closely.\n\n### 2) `corruption_burst`\n\nGoal: protection against brief severe disruptions.\n\nGenerator:\n\n- baseline: $\\mu_t = 0.55 + 0.015\\,\\mathcal{N}(0,1)$\n- two corruption windows:\n  - $[0.30n, 0.42n)$: center at $-0.85$ with $0.03\\,\\mathcal{N}(0,1)$ noise\n  - $[0.60n, 0.72n)$: center at $-0.80$ with $0.03\\,\\mathcal{N}(0,1)$ noise\n- clip to $[-0.95, 0.95]$\n\nWhat this regime is meant to show:\n\n- pure optimism can overcommit during burst windows; SMART should gain by switching.\n\n### 3) `drift_plus_shift`\n\nGoal: representative mixed nonstationarity.\n\nGenerator:\n\n- early benign phase up to $0.55n$: $0.55 + 0.012\\,\\mathcal{N}(0,1)$\n- gradual downward drift on $[0.55n, 0.72n)$\n- sustained negative shift on $[0.72n, n)$: $-0.70 + 0.02\\,\\mathcal{N}(0,1)$\n- clip to $[-0.95, 0.95]$\n\nWhat this regime is meant to show:\n\n- SMART should be a pragmatic middle policy when the environment transitions from easy to hard.\n\n## Evaluation protocol\n\nPrimary figure protocol is regret-vs-horizon:\n\n- horizons: $n = 100, 200, \\ldots, 1000$\n- for each horizon, draw fresh sequences of exactly that length\n- default trials per horizon: 30\n- report mean regret and 95% CI ($\\text{mean} \\pm 1.96\\,\\text{SE}$)\n\nThis is intentionally not a single-run prefix trace.\n\n## Current empirical interpretation\n\nFrom the curated figure (`fig_exp03_quadratic_oco_regret_by_horizon.png`), the intended narrative is visible:\n\n1. `stable_benign`: SMART is near FTL and both are below robust OGD.\n2. `corruption_burst`: SMART reduces damage relative to pure FTL as burst impact accumulates.\n3. `drift_plus_shift`: SMART stays between optimistic and robust extremes in a way consistent with mixed-regime adaptation.\n\n## What this experiment supports\n\nThis experiment provides controlled evidence that SMART's one-switch mechanism carries to convex losses:\n\n- no unnecessary tax in benign dynamics,\n- useful protection under structured nonstationarity,\n- interpretable behavior through explicit switch timing.\n\n## Limits and non-claims\n\n- Sequences are synthetic constructions, not fitted from observed data.\n- Threshold scaling (`--threshold-scale`, default `0.0035`) is an explicit modeling choice.\n- Conclusions are about mechanism behavior in this toy-convex setting, not universal performance guarantees.\n\n## Outputs and code map\n\n- Main figure: `figures/fig_exp03_quadratic_oco_regret_by_horizon.png`\n- Generated output: `outputs/figures/exp03_quadratic_oco_regret_by_horizon.png`\n- Scenario generators: `src/sequence_generators.py`\n- FTL/OGD/SMART implementation: `src/oco_smart.py`\n- Horizon sweep runner: `run_experiments.py`\n", "figures": [{"filename": "fig_exp03_quadratic_oco_regret_by_horizon.png", "src": "assets/exp03_time_varying_mu_oco/fig_exp03_quadratic_oco_regret_by_horizon.png", "title": "Quadratic OCO: Regret by Horizon Across Sequence Regimes"}]}, {"slug": "exp04_leader_path_synthesis", "displayName": "Experiment 04: Leader-Path Synthesis for SMART in Online Linear Classification", "readme": "# Experiment 04: Leader-Path Synthesis for SMART in Online Linear Classification\n\n## Why this experiment exists\n\nThis experiment is designed to answer one practical question for the paper:\n\nCan SMART preserve optimistic performance in benign regimes while still protecting against nonstationary regime shifts in online linear classification?\n\nThe experiment is intentionally *illustrative* rather than fully realistic. The goal is to produce clean, interpretable evidence for the mechanism behind SMART (switching from optimistic to robust behavior at the right time), not to claim a domain benchmark.\n\n## What this experiment is testing\n\nWe evaluate three policies:\n\n- `FTL` (optimistic baseline)\n- `FTRL` (robust baseline)\n- `SMART` (starts as FTL, switches once to FTRL based on an online regret signal)\n\nThe target empirical story is:\n\n1. In benign conditions, SMART should look like FTL (no optimism tax).\n2. Under sustained shift, SMART should improve over pure FTL.\n3. In mixed regimes, SMART should land between optimistic and robust extremes in a sensible way.\n\n## Redesign gate: true-FTL OLC revision\n\nThe next revision should keep the useful part of this experiment--closed-form true FTL--but remove the hand-tuned leader-path narrative as the primary evidence.\n\n### SMART behavior claim\n\nThe experiment should demonstrate three paper-facing claims:\n\n1. **Preserve optimism:** on benign predictable streams, SMART should match true FTL and avoid the robust FTRL tax.\n2. **Protect in hard regimes:** on sustained adversarial or high-variation streams, SMART should switch before FTL regret grows linearly and should remain close to FTRL.\n3. **Interpretable switch:** in mixed streams, the switch should be explained by the exact monotone FTL trace $\\Sigma_t$ crossing a horizon-calibrated threshold near the onset of sustained deterioration.\n\n### Exact sequence families\n\nPrimary families should be generated directly in feature-label space with $\\|z_t\\|_2\\le \\rho<1$ to avoid boundary subgradient ambiguity while preserving exact FTL:\n\n1. **I.i.d. separable margin stream:** sample a unit separator $u$, draw normalized covariates, optionally bias samples toward a positive margin, and set $y_t=\\operatorname{sign}(\\langle z_t,u\\rangle)$.\n2. **Massart-noise stream:** use the same separator model, but flip labels with probability bounded by $\\eta<1/2$, with both a constant-noise version and a late high-noise suffix.\n3. **Alternating anti-leader stream:** use one or two fixed directions and choose signs that force repeated leader cancellation or reversal. This is illustrative, not representative; it verifies robust protection in a known FTL failure mode.\n4. **Benign-to-hard suffix stream:** start with the separable margin stream, then transition to either high-rate Massart noise or alternating anti-leader blocks. This is the main SMART sequence because it has an easy prefix where FTL is valuable and a sustained hard suffix where switching is valuable.\n5. **Abrupt/gradual separator drift diagnostic:** rotate the separator over a window while keeping bounded features. This is representative of concept drift, but should be interpreted carefully because static regret to the best fixed comparator can reward adaptation in ways that are not purely worst-case-regret behavior.\n\n### Why these sequences are appropriate\n\nThe i.i.d. and Massart families test whether SMART avoids unnecessary switching under standard online classification noise models. The anti-leader family is a controlled worst-case construction for FTL instability. The benign-to-hard suffix family is the closest match to SMART's single-switch design: optimism should be useful early, then the robust suffix policy should cap damage. The drift diagnostic links the experiment to practical nonstationarity, but should not be the sole evidence because static comparator regret is not the same as dynamic tracking quality.\n\n### Acceptance criteria\n\nA successful primary figure should show regret versus horizon on fresh sequences of exactly that horizon:\n\n1. Benign: `SMART` and true `FTL` curves are visually indistinguishable or within a small constant gap; `FTRL` is higher.\n2. Hard: true `FTL` grows substantially faster than `FTRL`; `SMART` switches with high probability and remains close to `FTRL`.\n3. Benign-to-hard: `SMART` is below both fixed baselines or near the lower envelope: it keeps the low-loss FTL prefix and avoids most of the FTL hard-suffix blow-up.\n4. Diagnostics: $\\Sigma_t$ is monotone, matches final FTL regret at $t=T$, and crosses the threshold near the designed hardening point.\n5. Calibration: a threshold-scale sweep includes the theory scale and shows the cost of switching too early or too late.\n\n### Required implementation corrections\n\nFor this loss/domain, true FTL and the comparator should be computed from the linear state $M_t=\\sum_{i\\le t}y_i z_i$, not from a played-point subgradient convention. SMART should switch causally after observing the round that crosses threshold, and FTRL should reset both its cumulative state and its time index on the suffix.\n\n## Formal setup\n\nAt round $t$, the learner chooses $x_t$ in the unit Euclidean ball:\n\n$$\nX = \\{x \\in \\mathbb{R}^d : \\|x\\|_2 \\le 1\\}\n$$\n\nThen it observes $(z_t, y_t)$ with label $y_t \\in \\{-1, +1\\}$ and incurs loss:\n\n$$\n\\ell_t(x) = \\tfrac{1}{2}\\,|\\langle z_t, x\\rangle - y_t|\n$$\n\nReported metric is regret to the best fixed action on the prefix:\n\n$$\n\\mathrm{Reg}_A(n) = \\sum_{t=1}^n \\ell_t(x_t^A) - \\min_{x \\in X}\\sum_{t=1}^n \\ell_t(x)\n$$\n\nThe robust baseline is concrete FTRL with quadratic regularization and $\\sqrt{t}$ scaling:\n\n$$\nx_t^{\\mathrm{FTRL}} = \\Pi_X\\!\\left(-\\frac{\\eta_0}{\\sqrt{t}}\\,\\theta_{t-1}\\right),\\quad \\eta_0 = \\sqrt{2}.\n$$\n\nThis is the correct robust comparator family in this implementation because updates are linearized in vector space and actions are constrained to an $\\ell_2$ ball.\n\n## Why leader-path synthesis is used\n\n### The computational issue\n\nIn this setting, two quantities repeatedly require solving prefix-level optimization structure:\n\n1. The comparator term $\\min_x \\sum_{i\\le t} \\ell_i(x)$ (for every $t$, horizon, run, regime).\n2. SMART's online switch statistic $\\Sigma_t$, which also depends on prefix best-action losses.\n\nEven with the current optimized evaluation code, these prefix recomputations are quadratic in horizon ($O(T^2 d)$ work per run for comparator-like quantities). If we additionally generated arbitrary sequences and tried to recover exact leader behavior by generic prefix optimization each round, cost would increase further and quickly dominate the horizon sweep.\n\nWith 3 regimes, 48 runs, and 40 horizons ($25..1000$ step $25$), brute-force prefix optimization on arbitrary synthetic sequences becomes a practical bottleneck.\n\n### The design response\n\nInstead of sampling $(z_t, y_t)$ first and solving for leaders afterward, this experiment does the reverse:\n\n1. Construct a target leader-direction path over time.\n2. Construct a realizable cumulative gradient path $\\theta_t$ with bounded increments.\n3. Convert each increment $\\Delta_t = \\theta_t - \\theta_{t-1}$ into a feature-label pair $(z_t, y_t)$ that realizes that update.\n\nThis makes the generated sequence explicitly compatible with the intended leader dynamics and avoids an additional expensive outer optimization loop during sequence construction.\n\n## Exact data-generating process (DGP)\n\nDefault dimension is $d=5$.\n\nFor each regime, synthesis builds:\n\n1. A target direction path on the unit sphere (`target_leaders`).\n2. A latent separator path (`w_star_path`) used to orient labels plausibly.\n3. A radius schedule $r_t$ controlling cumulative-gradient magnitude.\n4. A realizable $\\theta_t$ path with per-step cap $\\|\\Delta_t\\| \\le \\texttt{max\\_delta\\_norm}$.\n5. A mismatch schedule that controls deterministic label flips over time.\n\n### Common construction details\n\n- $\\theta_t^{\\text{des}} = -r_t u_t$ where $u_t$ is target direction.\n- Realizability cap: if $\\|\\Delta_t\\| > \\texttt{max\\_delta\\_norm}$, scale $\\Delta_t$ down to the cap.\n- Example realization uses $z_t = \\pm 2\\Delta_t$ and $y_t \\in \\{-1,+1\\}$ so induced gradient matches $\\Delta_t$ under the chosen loss.\n- Label mismatch is deterministic-rate controlled (accumulator-based flip mask), not i.i.d. Bernoulli, to reduce unnecessary Monte Carlo jaggedness.\n\n### Regime A: `stable_benign`\n\nPurpose: optimism safety.\n\n- Direction path stays near a fixed anchor.\n- Radius grows smoothly: $r_t \\approx 0.10 + 0.020\\sqrt{t+1}$ with small noise.\n- Very low mismatch (0.00 in fixed illustrative mode).\n\nFixed illustrative parameters used for the main plot:\n\n- `max_delta_norm=0.35`\n- `label_mismatch_prob=0.00`\n- `threshold_scale=0.015`\n- `direction_noise_scale=0.65`\n\n### Regime B: `persistent_shift`\n\nPurpose: sustained shift where pure FTL should fail.\n\n- Early segment near anchor $v_1$, then smooth transition toward $v_2$.\n- Direction shift window in synthesis path: roughly rounds $140..900$.\n- Radius shrinks post-shift (down to ~60% of pre-shift trend) to reduce leader stability.\n- Mismatch rate increases during the hard window (base + boosted schedule).\n\nFixed illustrative parameters:\n\n- `max_delta_norm=0.45`\n- `label_mismatch_prob=0.05`\n- `threshold_scale=0.006`\n- `direction_noise_scale=1.20`\n\n### Regime C: `delayed_hardening`\n\nPurpose: representative mixed nonstationarity.\n\n- Early benign phase.\n- Mid-phase gradual drift.\n- Later transition toward a new anchor ($v_3$) with higher mismatch.\n- Hardening boundaries are delayed relative to Regime B.\n\nFixed illustrative parameters:\n\n- `max_delta_norm=0.45`\n- `label_mismatch_prob=0.12`\n- `threshold_scale=0.005`\n- `direction_noise_scale=0.50`\n\n## SMART switch definition used here\n\nSMART tracks an online lower-bound-style FTL regret statistic $\\Sigma_t$ and switches once when:\n\n$$\n\\Sigma_t \\ge \\text{threshold}, \\qquad \\text{threshold} = \\texttt{threshold\\_scale}\\cdot\\sqrt{2T}.\n$$\n\nAfter switching, SMART uses the robust FTRL policy for the remainder of the horizon.\n\n## Evaluation protocol\n\nPrimary figure contract (paper-facing):\n\n- x-axis: Horizon\n- y-axis: regret at that horizon\n- each horizon is a fresh sequence of exactly that length\n- horizons: $25, 50, \\ldots, 1000$\n- runs per horizon: 48\n- seed base: 7\n\nUncertainty bands are $\\text{mean} \\pm 1.96\\,\\text{SE}$.\n\n## Results from current default run\n\nLatest default run (`python run_experiment.py --engine auto`) produced:\n\n- `stable_benign`: `FTL=0.208`, `FTRL=0.710`, `SMART=0.208`, `switch_mean=1001.0`\n- `persistent_shift`: `FTL=0.556`, `FTRL=0.534`, `SMART=0.342`, `switch_mean=376.2`\n- `delayed_hardening`: `FTL=0.231`, `FTRL=0.432`, `SMART=0.255`, `switch_mean=907.3`\n\nInterpretation:\n\n1. Stable benign: SMART is effectively identical to FTL, which is the intended no-tax behavior.\n2. Persistent shift: SMART clearly improves over both pure baselines in this constructed mixed regime by combining favorable prefix/suffix behavior.\n3. Delayed hardening: SMART is slightly worse than FTL but substantially better than robust FTRL, consistent with a pragmatic middle policy in gradual nonstationarity.\n\n## What this experiment supports for the paper\n\nThis experiment supports the claim that SMART can be a useful single-switch compromise between optimism and robustness:\n\n- It does not pay unnecessary cost when optimism is reliable.\n- It mitigates sustained regime-shift damage.\n- It remains interpretable through explicit switch timing.\n\n## Limits and non-claims\n\n- Sequences are synthetic and mechanism-oriented; they are not a claim of real-world prevalence.\n- Results depend on the specific illustrative regime construction and threshold calibration.\n- This is evidence for the adaptation mechanism, not a universal dominance claim over all nonstationary classification streams.\n\n## Outputs and code map\n\n- Main figure: `figures/fig_exp04_olc_regret_by_horizon.png`\n- Generated output: `outputs/figures/exp04_olc_regret_by_horizon.png`\n- Sequence synthesis: `src/synthesis.py`\n- Evaluation logic (FTL/FTRL/SMART, regrets, switch signal): `src/eval.py`\n- Experiment runner and plotting: `run_experiment.py`\n", "figures": [{"filename": "fig_exp04_olc_regret_by_horizon.png", "src": "assets/exp04_leader_path_synthesis/fig_exp04_olc_regret_by_horizon.png", "title": "Online Linear Classification: Regret by Horizon Across Sequence Regimes"}]}, {"slug": "exp05_true_ftl_olc", "displayName": "Experiment 05: True-FTL Online Linear Classification", "readme": "# Experiment 05: True-FTL Online Linear Classification\n\n## Why this experiment exists\n\nThis experiment is the replacement candidate for the older online linear classification studies in experiments 2 and 4.\n\nThe purpose is to demonstrate SMART in a vector-valued online linear classification setting where:\n\n1. true FTL is computed exactly,\n2. the robust FTRL baseline is specified concretely,\n3. the sequence families expose benign, hard, and mixed regimes,\n4. SMART's switch is explained by the exact adapted regret trace $\\Sigma_t$.\n\nThe paper-facing claim is:\n\nSMART preserves FTL's advantage on benign streams, switches to protect against sustained hard regimes, and gives an interpretable single-switch compromise on streams with an easy prefix followed by a hard suffix.\n\n## Design gate\n\n### SMART behavior claim\n\nThe experiment must show:\n\n1. **Preserve optimism:** on benign predictable streams, SMART should remain visually close to true FTL and avoid FTRL's robustness tax.\n2. **Protect in hard regimes:** on high-variation or adversarial streams, SMART should switch and avoid FTL's large regret growth.\n3. **Interpretable switch:** in mixed streams, the switch should occur when $\\Sigma_t$ crosses the calibrated threshold near the onset of sustained deterioration.\n\n### Sequence families\n\nThe default sequence families are:\n\n1. `iid_separable_margin`: i.i.d. bounded-margin separable stream.\n2. `massart_10`: the same stream with independent 10% label flips.\n3. `alternating_antileader`: fixed feature direction with alternating labels, used as an illustrative FTL failure mode.\n4. `benign_to_hard_suffix`: separable prefix followed by an adaptive anti-leader suffix, the main SMART single-switch regime.\n5. `separator_drift`: gradual rotation of the latent separator, included as a nonstationary diagnostic rather than the central proof example.\n\n### Why these sequences are appropriate\n\nThe i.i.d. and Massart streams are natural online classification baselines where optimism should not be punished. The alternating anti-leader stream is deliberately illustrative: it creates repeated FTL cancellation/reversal and checks robust protection. The benign-to-hard suffix stream is the closest match to SMART's one-switch design because the FTL prefix is useful and the adversarial suffix creates sustained trace growth. The separator drift stream links the experiment to practical concept drift, but static regret to the best fixed comparator should not be interpreted as dynamic tracking regret.\n\n### Acceptance criteria\n\nA successful run should show:\n\n1. In `iid_separable_margin`, SMART and FTL have nearly identical regret and FTRL is higher.\n2. In `alternating_antileader`, FTL grows faster than FTRL and SMART switches.\n3. In `benign_to_hard_suffix`, SMART is near or below the lower envelope of the fixed baselines by combining FTL's prefix and FTRL's suffix.\n4. The diagnostic plot shows monotone $\\Sigma_t$ and switch timing that is explainable from the threshold crossing.\n5. The threshold sweep shows the cost of switching too early or too late.\n\n## Formal setup\n\nAt each round, the learner chooses $x_t$ in the unit Euclidean ball:\n\n$$\nX = \\{x\\in\\mathbb{R}^d:\\|x\\|_2\\le 1\\}.\n$$\n\nIt observes $(z_t,y_t)$ with $\\|z_t\\|_2\\le \\rho\\le 1$ and $y_t\\in\\{-1,+1\\}$, and incurs:\n\n$$\n\\ell_t(x)=\\frac12|\\langle z_t,x\\rangle-y_t|.\n$$\n\nBecause $|\\langle z_t,x\\rangle|\\le 1$, this equals the linear loss:\n\n$$\n\\ell_t(x)=\\frac12(1-y_t\\langle z_t,x\\rangle).\n$$\n\nDefine the signed feature sum:\n\n$$\nM_t=\\sum_{i=1}^t y_i z_i.\n$$\n\nThe best fixed comparator loss on a prefix is:\n\n$$\n\\min_{x\\in X}\\sum_{i=1}^t \\ell_i(x)=\\frac{t}{2}-\\frac12\\|M_t\\|_2.\n$$\n\nRegret is measured against this best fixed comparator at each horizon.\n\nBecause the comparator is fixed while the algorithms are adaptive, FTRL or SMART can have negative static regret on some nonstationary synthetic streams. This is not a bug; it means the adaptive policy outperformed the best fixed action on that sequence.\n\n## Algorithms compared\n\n### True FTL\n\nFTL is exact and closed-form:\n\n$$\nx_t^{\\mathrm{FTL}}=\n\\begin{cases}\nM_{t-1}/\\|M_{t-1}\\|_2, & M_{t-1}\\ne 0,\\\\\n0, & M_{t-1}=0.\n\\end{cases}\n$$\n\nNo convex solver or subgradient proxy is used.\n\n### Robust FTRL baseline\n\nThe robust baseline is quadratic FTRL on the linear loss vectors $c_t=-\\frac12 y_t z_t$:\n\n$$\nx_t^{\\mathrm{FTRL}}\n=\\arg\\min_{\\|x\\|_2\\le 1}\n\\left\\langle \\sum_{i<t} c_i,x\\right\\rangle\n+\\frac{\\sqrt{t}}{2\\eta_0}\\|x\\|_2^2,\n\\qquad \\eta_0=\\sqrt{2}.\n$$\n\nEquivalently:\n\n$$\nx_t^{\\mathrm{FTRL}}\n=\n\\Pi_X\\left(\\frac{\\eta_0}{2\\sqrt{t}}M_{t-1}\\right).\n$$\n\nThis is the appropriate robust baseline because the loss is linear over a bounded Euclidean domain, and quadratic FTRL is the standard $O(\\sqrt{T})$ no-assumption fallback for this geometry.\n\n### SMART\n\nSMART starts with true FTL and computes:\n\n$$\n\\Sigma_t\n=\n\\sum_{i=1}^t \\ell_i(x_i^{\\mathrm{FTL}})\n-\\min_{x\\in X}\\sum_{i=1}^t\\ell_i(x).\n$$\n\nFor this exact setting, $\\Sigma_t$ is monotone and $\\Sigma_T=\\mathrm{Reg}_T(\\mathrm{FTL})$.\n\nSMART switches after observing the first round where:\n\n$$\n\\Sigma_t\\ge \\theta.\n$$\n\nThe default theory threshold is $\\theta=\\sqrt{2T}$. The calibrated SMART variant uses $\\theta=g_{\\mathrm{emp}}(T)$, where $g_{\\mathrm{emp}}(T)$ is the largest observed FTRL regret across designated hard calibration streams.\n\nAfter switching, FTRL is reset and run on the suffix only.\n\n## Evaluation protocol\n\nDefault run:\n\n```bash\npython experiments/exp05_true_ftl_olc/run_experiment.py\n```\n\nQuick smoke run:\n\n```bash\npython experiments/exp05_true_ftl_olc/run_experiment.py --quick\n```\n\nInvariant checks:\n\n```bash\npython experiments/exp05_true_ftl_olc/run_experiment.py --self-test\n```\n\nDefault dashboard configuration:\n\n- primary dimension: $d=20$\n- feature radius: $\\rho=0.8$\n- horizons: $T=100,200,\\ldots,1000$\n- trials per horizon: 24\n- empirical-threshold calibration trials: 8\n- deterministic seed: 7\n- dimension diagnostic: $d\\in\\{5,20,100\\}$\n\nHeavier paper-profile run:\n\n```bash\npython experiments/exp05_true_ftl_olc/run_experiment.py --paper-profile\n```\n\nThe paper profile uses horizons through $T=2000$ with 64 trials per horizon. It is intentionally not the default because dashboard regeneration should stay practical during iteration.\n\nEach horizon uses fresh sequences of exactly that length. Plots report mean regret with 95% confidence bands where applicable.\n\n## Outputs and figure provenance\n\nGenerated outputs:\n\n- `outputs/figures/exp05_olc_regret_by_horizon.png`\n- `outputs/figures/exp05_olc_empirical_threshold.png`\n- `outputs/figures/exp05_olc_switch_diagnostics.png`\n- `outputs/figures/exp05_olc_threshold_calibration.png`\n- `outputs/figures/exp05_olc_dimension_sweep.png`\n- `outputs/summary_regret.csv`\n- `outputs/empirical_g.csv`\n\nCurated dashboard figures:\n\n- `figures/fig_exp05_olc_regret_by_horizon.png`\n- `figures/fig_exp05_olc_empirical_threshold.png`\n- `figures/fig_exp05_olc_switch_diagnostics.png`\n- `figures/fig_exp05_olc_threshold_calibration.png`\n- `figures/fig_exp05_olc_dimension_sweep.png`\n- `figures/INDEX.md`\n\nThe dashboard can be regenerated from the repository root with:\n\n```bash\npython experiments/dashboard/generate_dashboard.py\n```\n\n## Interpretation\n\nThis experiment is designed to support a mechanism claim, not a dataset benchmark claim. The strongest paper-facing evidence is the joint behavior of:\n\n1. regret-by-horizon curves,\n2. switch diagnostics from $\\Sigma_t$,\n3. threshold calibration sensitivity,\n4. dimension robustness.\n\nThe expected result is not universal dominance by SMART. The intended story is that SMART tracks FTL when FTL is safe, switches when the exact trace indicates FTL has become risky, and provides a clean compromise between optimism and robustness in mixed regimes.\n\nLatest default run produced the following mean final regrets at $T=1000$:\n\n- `iid_separable_margin`: `FTL=5.861`, `FTRL=6.603`, `SMART-theory=5.861`, `SMART-calibrated=5.861`.\n- `massart_10`: `FTL=6.618`, `FTRL=7.527`, `SMART-theory=6.618`, `SMART-calibrated=6.618`.\n- `alternating_antileader`: `FTL=200.000`, `FTRL=6.925`, `SMART-theory=50.474`, `SMART-calibrated=20.270`.\n- `benign_to_hard_suffix`: `FTL=178.119`, `FTRL=-1.878`, `SMART-theory=48.900`, `SMART-calibrated=18.256`.\n- `separator_drift`: `FTL=5.459`, `FTRL=6.123`, `SMART-theory=5.459`, `SMART-calibrated=5.459`.\n\nThe main interpretation is:\n\n1. In benign and mild-noise regimes, SMART is indistinguishable from true FTL and improves over robust FTRL.\n2. In hard anti-leader regimes, SMART substantially reduces FTL's blow-up; FTRL remains the strongest pure robust baseline.\n3. In the mixed benign-to-hard regime, SMART switches after the hard suffix begins and sharply reduces FTL regret, while FTRL can achieve negative static regret because adaptive policies may beat the best fixed comparator on this synthetic nonstationary stream.\n\n## Limits and non-claims\n\n- The streams are synthetic and mechanism-oriented.\n- The anti-leader stream is illustrative rather than representative.\n- The separator drift diagnostic is not a dynamic-regret benchmark.\n- Empirical threshold calibration is itself a modeling choice and should be reported alongside the regret results.\n\n## Code map\n\n- Exact algorithms and invariants: `src/olc_exact.py`\n- Sequence families: `src/sequences.py`\n- Figure generation and dashboard curation: `run_experiment.py`\n", "figures": [{"filename": "fig_exp05_olc_dimension_sweep.png", "src": "assets/exp05_true_ftl_olc/fig_exp05_olc_dimension_sweep.png", "title": "Dimension Robustness on Benign-to-Hard OLC"}, {"filename": "fig_exp05_olc_empirical_threshold.png", "src": "assets/exp05_true_ftl_olc/fig_exp05_olc_empirical_threshold.png", "title": "Empirical Robust Threshold for True-FTL OLC"}, {"filename": "fig_exp05_olc_regret_by_horizon.png", "src": "assets/exp05_true_ftl_olc/fig_exp05_olc_regret_by_horizon.png", "title": "True-FTL Online Linear Classification: Regret by Horizon"}, {"filename": "fig_exp05_olc_switch_diagnostics.png", "src": "assets/exp05_true_ftl_olc/fig_exp05_olc_switch_diagnostics.png", "title": "SMART Switch Diagnostics in True-FTL OLC"}, {"filename": "fig_exp05_olc_threshold_calibration.png", "src": "assets/exp05_true_ftl_olc/fig_exp05_olc_threshold_calibration.png", "title": "SMART Threshold Calibration Across OLC Regimes"}]}]};

    function escHtml(s) {
      return s.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function inlineMd(s) {
      let x = escHtml(s);
      x = x.replace(/`([^`]+)`/g, "<code>$1</code>");
      x = x.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      x = x.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      return x;
    }

    function renderMarkdown(md) {
      if (!md || !md.trim()) return '<p class="empty">No markdown content found.</p>';
      const lines = md.replace(/\r\n/g, "\n").split("\n");
      let out = "";
      let inCode = false;
      let listType = null;
      let para = [];

      function flushPara() {
        if (para.length) {
          out += "<p>" + inlineMd(para.join(" ")) + "</p>";
          para = [];
        }
      }

      function closeList() {
        if (listType) {
          out += listType === "ol" ? "</ol>" : "</ul>";
          listType = null;
        }
      }

      for (const rawLine of lines) {
        const trimmed = rawLine.trim();
        if (trimmed.startsWith("```")) {
          flushPara();
          closeList();
          if (!inCode) {
            inCode = true;
            out += "<pre><code>";
          } else {
            inCode = false;
            out += "</code></pre>";
          }
          continue;
        }
        if (inCode) {
          out += escHtml(rawLine) + "\n";
          continue;
        }
        if (!trimmed) {
          flushPara();
          closeList();
          continue;
        }
        const h = trimmed.match(/^(#{1,6})\s+(.*)$/);
        if (h) {
          flushPara();
          closeList();
          out += "<h" + h[1].length + ">" + inlineMd(h[2]) + "</h" + h[1].length + ">";
          continue;
        }
        const ul = trimmed.match(/^[-*]\s+(.*)$/);
        if (ul) {
          flushPara();
          if (listType !== "ul") {
            closeList();
            listType = "ul";
            out += "<ul>";
          }
          out += "<li>" + inlineMd(ul[1]) + "</li>";
          continue;
        }
        const ol = trimmed.match(/^\d+\.\s+(.*)$/);
        if (ol) {
          flushPara();
          if (listType !== "ol") {
            closeList();
            listType = "ol";
            out += "<ol>";
          }
          out += "<li>" + inlineMd(ol[1]) + "</li>";
          continue;
        }
        para.push(trimmed);
      }

      flushPara();
      closeList();
      return out;
    }

    function renderFigures(figures) {
      if (!figures || figures.length === 0) {
        return '<p class="empty">No figures found in this experiment\'s <code>figures/</code> folder.</p>';
      }
      let html = '<div class="gallery">';
      for (const fig of figures) {
        html += '<article class="figure">' +
          '<a href="' + fig.src + '" target="_blank" rel="noopener noreferrer">' +
          '<img src="' + fig.src + '" alt="' + escHtml(fig.title) + '" loading="lazy" />' +
          '</a>' +
          '<div class="figure-meta">' +
          '<p class="figure-title">' + escHtml(fig.title) + '</p>' +
          '<p class="figure-file"><code>' + escHtml(fig.filename) + '</code></p>' +
          '</div>' +
          '</article>';
      }
      html += '</div>';
      return html;
    }

    tabsRoot.addEventListener("click", (ev) => {
      const t = ev.target;
      if (!(t instanceof HTMLElement)) return;
      if (!t.classList.contains("nav-item")) return;
      activate(t.dataset.tab || "overview");
    });

    activate("overview");
  </script>
</body>
</html>
